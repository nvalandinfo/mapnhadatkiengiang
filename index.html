<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NVALAND - MOBILE OPTIMIZED</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <style>
        :root { --navy: #152238; --gold: #d4af37; --white: #ffffff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; background: #0b1320; }
        #map { width: 100%; height: 100vh; z-index: 1; }

        /* LOGO - Chỉnh lại để không bị che */
        .brand-header {
            position: absolute; top: 10px; left: 10px; z-index: 1002;
            background: var(--navy); padding: 8px 12px; border-radius: 6px;
            border: 1.5px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .brand-header span { color: var(--gold); font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }

        /* ĐIỀU KHIỂN - Thu nhỏ lại trên mobile */
        .main-controls {
            position: absolute; top: 10px; right: 10px; left: 110px; /* Chừa khoảng trống cho logo bên trái */
            z-index: 1001; display: flex; flex-direction: column; gap: 5px;
        }
        .search-row { display: flex; gap: 4px; align-items: center; justify-content: flex-end; }
        
        .search-box {
            flex: 1; max-width: 250px; /* Giới hạn độ rộng ô tìm kiếm */
            background: white; border-radius: 20px; display: flex; align-items: center;
            padding: 2px 10px; border: 1.5px solid var(--navy);
        }
        .search-box input { border: none; flex: 1; outline: none; font-size: 13px; padding: 6px; width: 100%; }
        
        .btn-ui { 
            background: var(--navy); color: var(--gold); border: 1px solid var(--gold); 
            padding: 7px 12px; border-radius: 15px; font-weight: bold; cursor: pointer; 
            font-size: 11px; white-space: nowrap;
        }
        .btn-post { background: #28a745; color: white; border-color: #fff; }

        /* BẢNG BỘ LỌC */
        .filter-panel {
            background: white; border-radius: 10px; padding: 12px; display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-top: 3px solid var(--gold);
            margin-top: 5px;
        }
        .filter-panel.active { display: block; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .filter-grid select { padding: 6px; border-radius: 4px; border: 1px solid #ccc; font-size: 12px; }

        /* GHIM ĐỎ */
        .price-pin { display: flex; flex-direction: column; align-items: center; }
        .pin-label {
            background: var(--navy); color: var(--gold); padding: 1px 6px;
            border-radius: 4px; font-weight: bold; font-size: 10px;
            border: 1px solid var(--gold); white-space: nowrap;
        }
        .pin-drop {
            width: 24px; height: 24px;
            background: url('https://cdn-icons-png.flaticon.com/512/684/684908.png') no-repeat center;
            background-size: contain; filter: hue-rotate(140deg) brightness(0.8) saturate(5);
        }

        /* SIDE PANEL */
        #side-panel {
            position: fixed; top: 0; right: -100%; width: 100%; max-width: 350px; height: 100%;
            background: white; z-index: 2000; transition: 0.4s ease;
        }
        #side-panel.active { right: 0; }

        @media (max-width: 480px) {
            .main-controls { left: 100px; } /* Thu hẹp thêm trên màn hình cực nhỏ */
            .search-box { max-width: 150px; }
            .btn-ui span { display: none; } /* Ẩn chữ nếu cần, chỉ để icon hoặc rút gọn */
        }
    </style>
</head>
<body>

<div class="brand-header"><span>NVALAND</span></div>

<div class="main-controls">
    <div class="search-row">
        <div class="search-box">
            <input type="text" id="inputSearch" placeholder="Tìm mã số...">
            <button onclick="executeSearch()" style="background:none; border:none; cursor:pointer; font-size:12px;">🔍</button>
        </div>
        <button class="btn-ui" onclick="toggleFilter()">Lọc</button>
        <button class="btn-ui btn-post" onclick="alert('Đang phát triển')">+</button>
    </div>

    <div class="filter-panel" id="filterPanel">
        <div class="filter-grid">
            <select id="fType"><option value="">Loại hình</option><option value="Đất nền">Đất nền</option><option value="Nhà phố">Nhà phố</option></select>
            <select id="fPrice"><option value="">Giá</option><option value="1">< 2 tỷ</option><option value="2">2-5 tỷ</option></select>
        </div>
        <button class="btn-ui" style="width:100%; margin-top:8px;" onclick="executeFilter()">Áp dụng</button>
    </div>
</div>

<div id="side-panel">
    <div style="padding:20px;">
        <span onclick="closePanel()" style="float:right; font-size:25px; cursor:pointer;">✕</span>
        <div id="panelBody" style="margin-top:30px;"></div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
    var map = L.map('map', { zoomControl: false }).setView([10.012, 105.090], 14);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    const bdsData = [];
    const types = ["Đất nền", "Nhà phố", "Biệt thự"];
    for (let i = 1; i <= 30; i++) {
        bdsData.push({
            id: "RG" + (i < 10 ? "0" + i : i),
            ten: types[i % 3] + " số " + i,
            gia: (Math.random() * 8 + 1).toFixed(1) + " tỷ",
            toaDo: [10.005 + (Math.random() * 0.02), 105.080 + (Math.random() * 0.03)],
            type: types[i % 3]
        });
    }

    var clusters = L.markerClusterGroup();
    function renderMarkers(data) {
        clusters.clearLayers();
        data.forEach(item => {
            const icon = L.divIcon({
                className: 'custom-pin',
                html: `<div class="price-pin"><div class="pin-label">${item.gia}</div><div class="pin-drop"></div></div>`,
                iconSize: [50, 50], iconAnchor: [25, 50]
            });
            const marker = L.marker(item.toaDo, { icon: icon }).on('click', () => openDetail(item));
            clusters.addLayer(marker);
        });
        map.addLayer(clusters);
    }
    renderMarkers(bdsData);

    function toggleFilter() { document.getElementById('filterPanel').classList.toggle('active'); }
    function closePanel() { document.getElementById('side-panel').classList.remove('active'); }
    function openDetail(item) {
        document.getElementById('panelBody').innerHTML = `<h3>${item.ten}</h3><p>Mã: ${item.id}</p><p>Giá: ${item.gia}</p><a href="tel:0354244883" class="btn-ui" style="display:block; text-align:center;">Gọi ngay</a>`;
        document.getElementById('side-panel').classList.add('active');
    }
    function executeSearch() {
        const query = document.getElementById('inputSearch').value.toUpperCase();
        const res = bdsData.find(i => i.id === query);
        if(res) openDetail(res); else alert("Không thấy!");
    }
</script>
</body>
</html>
