<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVALAND - FIX TRIỆT ĐỂ 100%</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <style>
        :root { --navy: #152238; --gold: #d4af37; --red: #e11d48; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; }
        #map { width: 100%; height: 100vh; z-index: 1; }

        /* THANH ĐIỀU KHIỂN & BỘ LỌC */
        .top-ui {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 1001; width: 95%; max-width: 800px;
            background: rgba(21, 34, 56, 0.95); padding: 15px; border-radius: 15px;
            border: 1px solid var(--gold); box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .search-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .search-box { flex: 1; background: white; border-radius: 25px; display: flex; padding: 5px 15px; }
        .search-box input { border: none; outline: none; width: 100%; font-size: 14px; }
        
        .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-row select { flex: 1; min-width: 100px; padding: 8px; border-radius: 5px; border: none; font-size: 12px; }
        
        .btn { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--gold); cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-gold { background: var(--gold); color: var(--navy); }
        .btn-post { background: #28a745; color: white; border: none; }

        /* GHIM ĐỎ SVG (KHÔNG LO LỖI ẢNH) */
        .custom-pin-svg { display: flex; flex-direction: column; align-items: center; }
        .pin-tag { background: var(--navy); color: var(--gold); padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; border: 1px solid var(--gold); margin-bottom: -2px; z-index: 2; }

        /* MÀU CỤM (CLUSTER) */
        .marker-cluster-small { background-color: rgba(110, 204, 57, 0.6); }
        .marker-cluster-small div { background-color: rgba(110, 204, 57, 1); color: white; }
        .marker-cluster-medium { background-color: rgba(241, 211, 87, 0.6); }
        .marker-cluster-medium div { background-color: rgba(241, 211, 87, 1); color: black; }
        .marker-cluster { background-clip: padding-box; border-radius: 20px; }
        .marker-cluster div { width: 30px; height: 30px; margin-left: 5px; margin-top: 5px; text-align: center; border-radius: 15px; font: 12px Arial; font-weight: bold; line-height: 30px; }

        #info-box { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; background: white; padding: 15px; border-radius: 10px; display: none; width: 300px; box-shadow: 0 0 20px rgba(0,0,0,0.3); border-top: 5px solid var(--navy); }
    </style>
</head>
<body>

<div class="top-ui">
    <div class="search-row">
        <div class="search-box"><input type="text" id="sInput" placeholder="Tìm theo mã RG01, RG02..."></div>
        <button class="btn btn-post">ĐĂNG TIN +</button>
    </div>
    <div class="filter-row">
        <select id="sType"><option value="">Loại hình</option><option value="Đất">Đất nền</option><option value="Nhà">Nhà phố</option></select>
        <select id="sPrice"><option value="">Mức giá</option><option value="3">Dưới 3 tỷ</option><option value="10">Trên 3 tỷ</option></select>
        <button class="btn btn-gold" onclick="filterData()">LỌC NGAY</button>
    </div>
</div>

<div id="info-box"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.js"></script>

<script>
    // 1. Khởi tạo Map
    var map = L.map('map', {zoomControl: false}).setView([10.012, 105.090], 14);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    // 2. Tạo 30 dữ liệu mẫu (Cố định tọa độ quanh Rạch Giá)
    const bdsList = [];
    for (let i = 1; i <= 30; i++) {
        bdsList.push({
            id: "RG" + (i < 10 ? "0"+i : i),
            lat: 10.005 + (Math.random() * 0.02),
            lng: 105.075 + (Math.random() * 0.03),
            gia: (Math.random() * 8 + 1).toFixed(1),
            loai: i % 2 === 0 ? "Nhà" : "Đất"
        });
    }

    // 3. SVG Ghim Đỏ (Đảm bảo không bao giờ lỗi hiển thị)
    const redPinSVG = `
        <svg width="30" height="30" viewBox="0 0 24 24" fill="red" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0C7.58 0 4 3.58 4 8c0 5.25 8 13 8 13s8-7.75 8-13c0-4.42-3.58-8-8-8zm0 11c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z" stroke="white" stroke-width="1"/>
        </svg>`;

    var clusters = L.markerClusterGroup({
        iconCreateFunction: function(cluster) {
            var count = cluster.getChildCount();
            var color = count < 10 ? 'small' : 'medium';
            return new L.DivIcon({ html: '<div><span>' + count + '</span></div>', className: 'marker-cluster marker-cluster-' + color, iconSize: [40, 40] });
        }
    });

    function draw(data) {
        clusters.clearLayers();
        data.forEach(item => {
            var icon = L.divIcon({
                className: 'custom-pin-svg',
                html: `<div class="pin-tag">${item.gia} tỷ</div>${redPinSVG}`,
                iconSize: [30, 45], iconAnchor: [15, 45]
            });
            var m = L.marker([item.lat, item.lng], {icon: icon}).on('click', function() {
                var box = document.getElementById('info-box');
                box.style.display = 'block';
                box.innerHTML = `<strong>${item.id}</strong><br>Loại: ${item.loai}<br>Giá: ${item.gia} tỷ<br><button onclick="this.parentElement.style.display='none'" style="margin-top:10px; width:100%">Đóng</button>`;
                map.flyTo([item.lat, item.lng], 16);
            });
            clusters.addLayer(m);
        });
        map.addLayer(clusters);
    }

    // Chạy vẽ lần đầu
    draw(bdsList);

    // Hàm Lọc
    function filterData() {
        var t = document.getElementById('sType').value;
        var p = document.getElementById('sPrice').value;
        var filtered = bdsList.filter(i => (!t || i.loai === t) && (!p || (p == "3" ? i.gia <= 3 : i.gia > 3)));
        draw(filtered);
    }

    // Tìm kiếm nhanh
    document.getElementById('sInput').addEventListener('input', function(e) {
        var val = e.target.value.toUpperCase();
        var found = bdsList.filter(i => i.id.includes(val));
        draw(found);
    });
</script>
</body>
</html>
