<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVALAND - BẢN ĐỒ BĐS RẠCH GIÁ</title>
    <!-- CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <style>
        :root { --navy: #152238; --gold: #d4af37; --red: #ff0000; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100vh; z-index: 1; }

        /* GIAO DIỆN ĐIỀU KHIỂN */
        .header-controls {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 95%; max-width: 900px; display: flex; flex-direction: column; gap: 10px;
        }
        .search-row { display: flex; gap: 8px; align-items: center; background: rgba(21, 34, 56, 0.9); padding: 8px 15px; border-radius: 50px; border: 1px solid var(--gold); }
        .search-box { flex: 1; display: flex; background: white; border-radius: 20px; padding: 5px 15px; }
        .search-box input { border: none; outline: none; width: 100%; padding: 5px; }
        
        .btn-action { background: var(--navy); color: var(--gold); border: 1px solid var(--gold); padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; white-space: nowrap; font-size: 13px; }
        .btn-post { background: #28a745; color: white; border: none; }

        /* BỘ LỌC */
        .filter-bar { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
        .filter-bar select { padding: 5px 10px; border-radius: 5px; border: 1px solid var(--gold); background: white; font-size: 12px; }

        /* MARKER ĐỎ */
        .red-pin-wrapper { display: flex; flex-direction: column; align-items: center; }
        .pin-price { background: var(--navy); color: var(--gold); padding: 2px 5px; border-radius: 3px; font-size: 10px; font-weight: bold; margin-bottom: 2px; border: 0.5px solid var(--gold); }
        .pin-icon { width: 30px; height: 30px; background: url('https://cdn-icons-png.flaticon.com/512/684/684908.png') no-repeat center; background-size: contain; filter: hue-rotate(140deg) brightness(0.9) saturate(10); }

        /* CỤM (CLUSTER) THEO HÌNH image_a6cb14.jpg */
        .marker-cluster-small { background-color: rgba(110, 204, 57, 0.6); } /* Xanh lá < 10 */
        .marker-cluster-small div { background-color: rgba(110, 204, 57, 1); }
        .marker-cluster-medium { background-color: rgba(241, 211, 87, 0.6); } /* Vàng 10-100 */
        .marker-cluster-medium div { background-color: rgba(241, 211, 87, 1); }
        .marker-cluster-large { background-color: rgba(253, 156, 115, 0.6); } /* Cam > 100 */
        .marker-cluster-large div { background-color: rgba(253, 156, 115, 1); }
        
        .marker-cluster { background-clip: padding-box; border-radius: 20px; }
        .marker-cluster div { width: 30px; height: 30px; margin-left: 5px; margin-top: 5px; text-align: center; border-radius: 15px; font: 12px Arial; font-weight: bold; line-height: 30px; color: black; }

        /* PANEL CHI TIẾT */
        #detail-panel { position: fixed; right: -400px; top: 0; width: 350px; height: 100%; background: white; z-index: 2000; transition: 0.3s; padding: 20px; box-shadow: -2px 0 10px rgba(0,0,0,0.2); }
        #detail-panel.active { right: 0; }
    </style>
</head>
<body>

<div class="header-controls">
    <div class="search-row">
        <div class="search-box"><input type="text" id="searchInput" placeholder="Tìm kiếm BĐS (RG01-RG30)..."></div>
        <button class="btn-action btn-post">Đăng BĐS</button>
    </div>
    <div class="filter-bar">
        <select id="fType"><option value="">Loại hình</option><option value="Đất">Đất nền</option><option value="Nhà">Nhà phố</option></select>
        <select id="fPrice"><option value="">Giá</option><option value="2">Dưới 2 tỷ</option><option value="5">Dưới 5 tỷ</option></select>
        <select id="fDir"><option value="">Hướng</option><option value="Đông">Đông</option><option value="Tây">Tây</option></select>
        <button class="btn-action" onclick="applyFilter()">Lọc</button>
    </div>
</div>

<div id="detail-panel">
    <button onclick="document.getElementById('detail-panel').classList.remove('active')">Đóng</button>
    <div id="content"></div>
</div>

<div id="map"></div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.js"></script>

<script>
    // 1. Bản đồ vệ tinh
    const map = L.map('map', {zoomControl: false}).setView([10.012, 105.090], 14);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    // 2. Tạo 30 dữ liệu mẫu chuẩn (RG01 - RG30)
    const rawData = [];
    for (let i = 1; i <= 30; i++) {
        rawData.push({
            id: "RG" + (i < 10 ? "0"+i : i),
            lat: 10.000 + (Math.random() * 0.03),
            lng: 105.070 + (Math.random() * 0.05),
            gia: (Math.random() * 9 + 1).toFixed(1),
            loai: i % 2 === 0 ? "Nhà" : "Đất",
            huong: i % 2 === 0 ? "Đông" : "Tây"
        });
    }

    // 3. Cluster đổi màu theo số lượng
    const clusters = L.markerClusterGroup({
        iconCreateFunction: function(cluster) {
            const count = cluster.getChildCount();
            let c = ' small';
            if (count >= 100) c = ' large';
            else if (count >= 10) c = ' medium';
            return new L.DivIcon({ 
                html: '<div><span>' + count + '</span></div>', 
                className: 'marker-cluster marker-cluster-' + c.trim(), 
                iconSize: [40, 40] 
            });
        }
    });

    function render(list) {
        clusters.clearLayers();
        list.forEach(item => {
            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="red-pin-wrapper"><div class="pin-price">${item.gia} tỷ</div><div class="pin-icon"></div></div>`,
                iconSize: [60, 50], iconAnchor: [30, 45]
            });
            const m = L.marker([item.lat, item.lng], {icon: icon}).on('click', () => {
                document.getElementById('content').innerHTML = `<h2>${item.id}</h2><p>Giá: ${item.gia} tỷ</p><p>Loại: ${item.loai}</p>`;
                document.getElementById('detail-panel').classList.add('active');
            });
            clusters.addLayer(m);
        });
        map.addLayer(clusters);
    }

    // Khởi chạy lần đầu
    render(rawData);

    // Tìm kiếm & Lọc
    function applyFilter() {
        const t = document.getElementById('fType').value;
        const p = document.getElementById('fPrice').value;
        const filtered = rawData.filter(i => (!t || i.loai === t) && (!p || parseFloat(i.gia) <= p));
        render(filtered);
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const val = e.target.value.toUpperCase();
        const filtered = rawData.filter(i => i.id.includes(val));
        render(filtered);
    });
</script>
</body>
</html>
