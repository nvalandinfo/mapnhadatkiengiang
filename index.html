<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NVALAND - RẠCH GIÁ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100vh; }

        /* LOGO BO VIỀN VÀNG ÁNH KIM */
        .brand-container {
            position: absolute; top: 15px; left: 15px; z-index: 1001;
            padding: 5px; background: rgba(255,255,255,0.1);
            border-radius: 15px; border: 2px solid #d4af37; /* Vàng ánh kim */
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }
        .brand-container img {
            display: block; width: 100px; height: auto; border-radius: 10px;
        }

        /* Ô TÌM KIẾM AI THÔNG MINH */
        .search-area {
            position: absolute; top: 15px; left: 140px; right: 15px; z-index: 1001;
        }
        .ai-search-box {
            background: white; border-radius: 50px; display: flex; align-items: center;
            padding: 8px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid #d4af37;
        }
        .ai-search-box input {
            border: none; width: 100%; outline: none; font-size: 15px;
        }

        /* KẾT QUẢ GỢI Ý */
        .ai-results {
            background: white; border-radius: 15px; margin-top: 8px;
            max-height: 0; overflow: hidden; transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .ai-results.active { max-height: 300px; border: 1px solid #eee; }
        .ai-item { padding: 12px 20px; border-bottom: 1px solid #f5f5f5; cursor: pointer; }
        .ai-item:hover { background: #fff7ed; }

        /* ĐIỀU CHỈNH NÚT ZOOM XUỐNG DƯỚI GÓC PHẢI */
        .leaflet-top.leaflet-right { top: auto !important; bottom: 30px !important; }
        .leaflet-bar a { 
            width: 45px !important; height: 45px !important; 
            line-height: 45px !important; font-size: 22px !important; 
            border-radius: 10px !important; margin-bottom: 5px !important;
        }

        /* GHIM VÀ NHÃN GIÁ */
        .price-label {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            background: #f97316; color: white; font-weight: bold;
            padding: 2px 8px; border-radius: 6px; font-size: 12px;
            border: 2px solid white; white-space: nowrap;
        }
        .pin-custom {
            width: 35px; height: 35px;
            background: url('https://cdn-icons-png.flaticon.com/512/684/684908.png') no-repeat center;
            background-size: contain;
        }
    </style>
</head>
<body>

<div class="brand-container">
    <img src="https://raw.githubusercontent.com/mapnhadat/mapnhadat/main/4557771479993397999.jpg" alt="Logo">
</div>

<div class="search-area">
    <div class="ai-search-box">
        <input type="text" id="aiInput" placeholder="Tìm theo giá, vị trí, đặc điểm..." oninput="aiSearch()">
        <span>🔍</span>
    </div>
    <div id="aiResults" class="ai-results"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
    // DỮ LIỆU TẠI RẠCH GIÁ
    const bdsData = [
        { id: 1, ten: "Lô A1 - Khu lấn biển Rạch Giá", gia: "4.5 tỷ", toaDo: [10.012, 105.080], anh: "https://via.placeholder.com/150", mota: "Gần công viên, view biển mượt mà." },
        { id: 2, ten: "Nhà phố Phan Thị Ràng", gia: "3.2 tỷ", toaDo: [10.008, 105.105], anh: "https://via.placeholder.com/150", mota: "Khu dân cư đông đúc, kinh doanh tốt." },
        { id: 3, ten: "Đất nền Phú Cường", gia: "2.1 tỷ", toaDo: [10.002, 105.092], anh: "https://via.placeholder.com/150", mota: "Sổ hồng riêng, hỗ trợ vay ngân hàng." }
    ];

    // KHỞI TẠO BẢN ĐỒ TẠI TRUNG TÂM RẠCH GIÁ (10.012, 105.080)
    var map = L.map('map', { 
        zoomControl: true,
        attributionControl: false 
    }).setView([10.012, 105.080], 14);

    // Chuyển nút Zoom sang bên phải
    map.zoomControl.setPosition('topright');

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    var clusters = L.markerClusterGroup();
    var markerRefs = {};

    bdsData.forEach(item => {
        var icon = L.divIcon({
            className: 'marker-box',
            html: `<div class="price-label">${item.gia}</div><div class="pin-custom"></div>`,
            iconSize: [35, 35], iconAnchor: [17, 35]
        });

        var marker = L.marker(item.toaDo, { icon: icon });
        marker.bindPopup(`
            <div style="width:200px">
                <img src="${item.anh}" style="width:100%; border-radius:10px">
                <h3 style="margin:10px 0 5px">${item.ten}</h3>
                <b style="color:#f97316">${item.gia}</b>
                <p style="font-size:12px; color:#666">${item.mota}</p>
                <a href="tel:0900000000" style="display:block; background:#f97316; color:white; text-align:center; padding:10px; border-radius:5px; text-decoration:none; font-weight:bold">Gọi tư vấn</a>
            </div>
        `);

        clusters.addLayer(marker);
        markerRefs[item.id] = marker;
    });
    map.addLayer(clusters);

    // AI SEARCH LOGIC
    function aiSearch() {
        const query = document.getElementById('aiInput').value.toLowerCase();
        const resDiv = document.getElementById('aiResults');
        resDiv.innerHTML = '';

        if(query.length < 1) { resDiv.classList.remove('active'); return; }

        const matches = bdsData.filter(i => 
            i.ten.toLowerCase().includes(query) || 
            i.gia.toLowerCase().includes(query) ||
            i.mota.toLowerCase().includes(query)
        );

        if(matches.length > 0) {
            matches.forEach(i => {
                const d = document.createElement('div');
                d.className = 'ai-item';
                d.innerHTML = `<b>${i.ten}</b><br><small>Giá: ${i.gia}</small>`;
                d.onclick = () => {
                    map.flyTo(i.toaDo, 17);
                    setTimeout(() => markerRefs[i.id].openPopup(), 1000);
                    resDiv.classList.remove('active');
                    document.getElementById('aiInput').value = i.ten;
                };
                resDiv.appendChild(d);
            });
            resDiv.classList.add('active');
        } else {
            resDiv.classList.remove('active');
        }
    }
</script>
</body>
</html>
