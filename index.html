<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NVALAND - CHUYÊN NGHIỆP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <style>
        :root { --gold: #d4af37; --dark: #000033; --orange: #f97316; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100vh; z-index: 1; }

        /* LOGO BO VIỀN VÀNG ÁNH KIM (SỬA LỖI HIỂN THỊ) */
        .brand-box {
            position: absolute; top: 20px; left: 20px; z-index: 1001;
            padding: 5px; background: white; border-radius: 12px;
            border: 2px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .brand-box img { display: block; width: 80px; height: auto; border-radius: 8px; }

        /* THANH TÌM KIẾM AI */
        .search-wrapper {
            position: absolute; top: 20px; left: 130px; right: 20px; z-index: 1001;
            max-width: 400px;
        }
        .ai-input-group {
            background: white; border-radius: 30px; display: flex; align-items: center;
            padding: 10px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); border: 1px solid var(--gold);
        }
        .ai-input-group input { border: none; width: 100%; outline: none; font-size: 15px; }

        /* BẢNG THÔNG TIN TRƯỢT TỪ PHẢI SANG (SIDE PANEL) */
        #side-panel {
            position: fixed; top: 0; right: -100%; width: 350px; height: 100%;
            background: white; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 25px rgba(0,0,0,0.2); display: flex; flex-direction: column;
        }
        #side-panel.active { right: 0; }
        .panel-close { 
            position: absolute; top: 15px; left: -40px; background: white; 
            width: 40px; height: 40px; border-radius: 10px 0 0 10px; 
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1); font-size: 20px;
        }
        .panel-content { overflow-y: auto; flex: 1; }
        .panel-img { width: 100%; height: 200px; object-fit: cover; }
        .panel-body { padding: 20px; }
        .tag-id { background: #eee; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        
        /* CỤM NÚT ĐIỀU HƯỚNG CHUYÊN NGHIỆP */
        .action-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { 
            padding: 12px; border-radius: 8px; text-align: center; 
            text-decoration: none; font-weight: bold; font-size: 14px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-call { background: var(--orange); color: white; grid-column: span 2; }
        .btn-dir { background: #2563eb; color: white; }
        .btn-zalo { background: #0068ff; color: white; }

        /* NÚT ZOOM (ĐẨY XUỐNG DƯỚI) */
        .leaflet-right .leaflet-control-zoom { margin-bottom: 30px !important; margin-right: 15px !important; border: none !important; }
        .leaflet-control-zoom-in, .leaflet-control-zoom-out { 
            background: white !important; width: 45px !important; height: 45px !important; 
            line-height: 45px !important; border-radius: 12px !important; color: var(--dark) !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2) !important; margin-top: 5px !important;
        }

        /* GHIM VÀ GIÁ */
        .price-tag {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            background: var(--orange); color: white; font-weight: bold;
            padding: 3px 10px; border-radius: 6px; font-size: 12px;
            border: 2px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .pin-icon { width: 35px; height: 35px; background: url('https://cdn-icons-png.flaticon.com/512/684/684908.png') no-repeat center; background-size: contain; }

        @media (max-width: 600px) { #side-panel { width: 85%; } }
    </style>
</head>
<body>

<div class="brand-box">
    <img src="https://raw.githubusercontent.com/nvalandinfo/mapnhadatkiengiang/main/4557771479993397999.jpg" alt="NVALAND">
</div>

<div class="search-wrapper">
    <div class="ai-input-group">
        <input type="text" id="aiInput" placeholder="Tìm giá, mã số, vị trí..." oninput="aiSearch()">
        <span>🔍</span>
    </div>
</div>

<div id="side-panel">
    <div class="panel-close" onclick="closePanel()">✕</div>
    <div class="panel-content" id="panelContent">
        </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
    const bdsData = [
        { 
            id: "RG-001", 
            ten: "Đất nền khu lấn biển Tây Bắc", 
            gia: "4.5 tỷ", 
            toaDo: [10.012, 105.080], 
            anh: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=600",
            mota: "Diện tích 5x20m, hướng biển, pháp lý hoàn chỉnh.",
            sdt: "0901234567"
        },
        { 
            id: "RG-002", 
            ten: "Nhà phố Phú Cường P. An Hòa", 
            gia: "3.2 tỷ", 
            toaDo: [10.008, 105.105], 
            anh: "https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=600",
            mota: "Gần bệnh viện đa khoa, đường rộng 12m.",
            sdt: "0907654321"
        }
    ];

    // Khởi tạo bản đồ tại Rạch Giá
    var map = L.map('map', { zoomControl: true }).setView([10.012, 105.080], 14);
    map.zoomControl.setPosition('bottomright'); // Đưa nút zoom xuống dưới

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    var clusters = L.markerClusterGroup();
    var markersList = {};

    bdsData.forEach(item => {
        var icon = L.divIcon({
            className: 'custom-marker',
            html: `<div class="price-tag">${item.gia}</div><div class="pin-icon"></div>`,
            iconSize: [35, 35], iconAnchor: [17, 35]
        });

        var marker = L.marker(item.toaDo, { icon: icon });
        
        marker.on('click', function() {
            showDetails(item);
        });

        clusters.addLayer(marker);
        markersList[item.id] = marker;
    });
    map.addLayer(clusters);

    function showDetails(item) {
        const panel = document.getElementById('side-panel');
        const content = document.getElementById('panelContent');
        
        content.innerHTML = `
            <img src="${item.anh}" class="panel-img">
            <div class="panel-body">
                <span class="tag-id">Mã số: ${item.id}</span>
                <h2 style="margin:15px 0 5px; color:var(--dark)">${item.ten}</h2>
                <div style="font-size: 24px; color: var(--orange); font-weight: bold; margin-bottom: 15px;">${item.gia}</div>
                <hr border="0" style="border-top:1px solid #eee">
                <p style="color:#666; line-height:1.6"><b>Thông tin:</b> ${item.mota}</p>
                
                <div class="action-group">
                    <a href="tel:${item.sdt}" class="btn btn-call">📞 GỌI NGAY: ${item.sdt}</a>
                    <a href="https://www.google.com/maps/dir/?api=1&destination=${item.toaDo[0]},${item.toaDo[1]}" target="_blank" class="btn btn-dir">📍 CHỈ ĐƯỜNG</a>
                    <a href="https://zalo.me/${item.sdt}" target="_blank" class="btn btn-zalo">💬 CHAT ZALO</a>
                </div>
            </div>
        `;
        panel.classList.add('active');
        map.flyTo(item.toaDo, 17);
    }

    function closePanel() {
        document.getElementById('side-panel').classList.remove('active');
    }

    function aiSearch() {
        const q = document.getElementById('aiInput').value.toLowerCase();
        const results = bdsData.filter(i => i.ten.toLowerCase().includes(q) || i.id.toLowerCase().includes(q) || i.gia.toLowerCase().includes(q));
        
        if(q.length > 0 && results.length > 0) {
            // Tự động bay đến kết quả đầu tiên nếu khớp hoàn toàn mã số
            const exactMatch = results.find(i => i.id.toLowerCase() === q);
            if(exactMatch) showDetails(exactMatch);
        }
    }
</script>
</body>
</html>
