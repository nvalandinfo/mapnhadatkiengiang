<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NVALAND PRO MAP - PHÚ QUỐC</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        #map { width: 100%; height: 100vh; z-index: 1; }

        /* HEADER THƯƠNG HIỆU - GỐC TRÊN TRÁI VỚI LOGO */
        .brand-header {
            position: absolute; top: 15px; left: 15px; z-index: 1001;
            display: flex; align-items: center; gap: 10px;
            background: rgba(0, 0, 51, 0.95); /* Màu xanh đen tối của logo */
            color: #d4af37; /* Màu vàng kim */
            padding: 8px 15px; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: 1px solid #d4af37; /* Viền vàng kim sang trọng */
        }
        /* Style cho khối logo ảnh */
        .brand-logo-img {
            width: 35px; height: 35px;
            background: #fff;
            border-radius: 50%; /* Làm logo thành vòng tròn */
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; padding: 2px;
            border: 1.5px solid #d4af37;
        }
        .brand-logo-img img { width: 100%; height: auto; object-fit: contain; }
        .brand-text { font-weight: 800; font-size: 16px; letter-spacing: 0.5px; }

        /* THANH TÌM KIẾM THÔNG MINH - mobile optimized */
        .search-container {
            position: absolute; top: 75px; left: 15px; right: 15px;
            z-index: 1000; transition: all 0.3s;
        }
        .search-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 12px; display: flex; align-items: center;
            padding: 2px 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .search-box input {
            border: none; background: transparent; padding: 10px;
            width: 100%; outline: none; font-size: 14px; color: #333;
        }
        .search-box .search-icon { color: #f97316; font-size: 18px; cursor: pointer; }

        /* KẾT QUẢ GỢI Ý */
        .search-results {
            position: absolute; top: 50px; right: 0; left: 0;
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-height: 0; transition: max-height 0.3s ease-out;
        }
        .search-results.active { max-height: 250px; border: 1px solid #eee; }
        .result-item {
            padding: 10px 15px; border-bottom: 1px solid #f9f9f9;
            cursor: pointer; font-size: 13px; display: flex; flex-direction: column;
        }
        .result-item:hover { background: #fff7ed; }
        .result-item b { color: #333; font-size: 14px; }
        .result-item small { color: #888; margin-top: 2px; }

        /* TỐI ƯU POPUP CHO MOBILE VÀ NGƯỜI LỚN TUỔI */
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; }
        .popup-container { width: 220px; font-size: 14px; }
        .popup-container img { 
            width: 100%; height: 120px; border-top-left-radius: 12px; 
            border-top-right-radius: 12px; margin-bottom: 5px; 
            object-fit: cover;
        }
        .popup-text { padding: 10px; }
        .popup-text h4 { margin: 0 0 5px 0; font-size: 16px; color: #333; }
        .popup-text .price { color: #f97316; font-weight: bold; font-size: 15px; }

        /* GHIM VÀ GIÁ CỐ ĐỊNH */
        .marker-with-label { position: relative; }
        .marker-label {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            background: #f97316; color: white; font-weight: bold;
            padding: 2px 8px; border-radius: 6px; font-size: 12px;
            border: 2px solid white; box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        .pin-icon {
            width: 35px; height: 35px;
            background: url('https://cdn-icons-png.flaticon.com/512/684/684908.png') no-repeat;
            background-size: contain;
        }

        /* ĐIỀU CHỈNH LẠI CÁC NÚT ZOOM MẶC ĐỊNH */
        .leaflet-touch .leaflet-bar { border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .leaflet-touch .leaflet-control-zoom-in, 
        .leaflet-touch .leaflet-control-zoom-out {
            background: white; color: #333; font-size: 20px; font-weight: bold;
            border-radius: 10px !important; margin-bottom: 5px; width: 35px; height: 35px; line-height: 35px;
        }

        @media (max-width: 600px) {
            .search-container { top: 65px; left: 15px; right: 15px; }
        }
    </style>
</head>
<body>

<div class="brand-header">
    <div class="brand-logo-img">
        <img src="https://raw.githubusercontent.com/mapnhadat/mapnhadat/main/image_3.png" alt="NVALAND Logo">
    </div>
    <div class="brand-text">NVALAND</div>
</div>

<div class="search-container">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Tìm tên lô, giá, mô tả..." oninput="handleSearch()">
        <span class="search-icon" onclick="handleSearch()">🔍</span>
    </div>
    <div id="searchResults" class="search-results"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
    // 1. CẬP NHẬT DỮ LIỆU ĐẤT NỀN PHÚ QUỐC (Tọa độ thực, bạn hãy thay bằng tọa độ thực của bạn)
    const dataBDS = [
        { id: 1, ten: "Lô A1 - Biệt Thự Gần Biển", gia: "10 tỷ", toaDo: [10.222, 103.955], anh: "https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=400", mota: "Gần bãi Sau, sân vườn rộng." },
        { id: 2, ten: "Đất Nền Trung Tâm Dương Đông", gia: "1 tỷ 200tr", toaDo: [10.215, 103.965], anh: "https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=400", mota: "Đã có sổ đỏ." },
        { id: 3, ten: "Nhà Phố MT Trần Hưng Đạo", gia: "2 tỷ 500tr", toaDo: [10.210, 103.960], anh: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=400", mota: "Thích hợp kinh doanh." },
        { id: 4, ten: "Lô 22 - Gần Sân Bay", gia: "3.5 tỷ", toaDo: [10.170, 103.980], anh: "https://via.placeholder.com/100", mota: "Sắp quy hoạch." },
        { id: 5, ten: "Gần Shophouse Vingroup", gia: "1.8 tỷ", toaDo: [10.225, 103.950], anh: "https://via.placeholder.com/100", mota: "Tiềm năng cao." }
    ];

    // 2. KHỞI TẠO BẢN ĐỒ VỚI NÚT ZOOM (Mở nút + và - để người lớn tuổi ấn nút)
    // Dòng code quan trọng: zoomControl: true
    var map = L.map('map', { zoomControl: true }).setView([10.215, 103.965], 13);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    var markers = L.markerClusterGroup({ spiderfyOnMaxZoom: true, showCoverageOnHover: false, zoomToBoundsOnClick: true });
    var markerMap = {}; 

    dataBDS.forEach(item => {
        var customIcon = L.divIcon({
            className: 'marker-with-label',
            html: `<div class="marker-label">${item.gia}</div><div class="pin-icon"></div>`,
            iconSize: [35, 35], iconAnchor: [17, 35]
        });

        var marker = L.marker(item.toaDo, { icon: customIcon });
        
        // Popup đã được tối ưu cho mobile
        marker.bindPopup(`
            <div class="popup-container">
                <img src="${item.anh}">
                <div class="popup-text">
                    <h4>${item.ten}</h4>
                    <span class="price">${item.gia}</span>
                    <p style="font-size:12px; color:#666; margin: 5px 0 0 0">${item.mota}</p>
                </div>
            </div>
        `);

        markers.addLayer(marker);
        markerMap[item.id] = { marker, item };
    });
    map.addLayer(markers);

    // XỬ LÝ TÌM KIẾM THÔNG MINH (Mobile Optimized)
    function handleSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const resultsDiv = document.getElementById('searchResults');
        resultsDiv.innerHTML = '';

        if (query.length < 1) {
            resultsDiv.classList.remove('active');
            return;
        }

        const filtered = dataBDS.filter(item => 
            item.ten.toLowerCase().includes(query) || 
            item.mota.toLowerCase().includes(query)
        );

        if (filtered.length > 0) {
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `<b>${item.ten}</b><small>${item.mota}</small>`;
                div.onclick = () => {
                    map.flyTo(item.toaDo, 17, { duration: 2 });
                    setTimeout(() => markerMap[item.id].marker.openPopup(), 1500);
                    resultsDiv.classList.remove('active');
                    document.getElementById('searchInput').value = item.ten;
                };
                resultsDiv.appendChild(div);
            });
            resultsDiv.classList.add('active');
        } else {
            resultsDiv.classList.remove('active');
        }
    }

    // Đóng gợi ý khi bấm ra ngoài bản đồ
    map.on('click', () => {
        document.getElementById('searchResults').classList.remove('active');
    });
</script>
</body>
</html>
