<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NVALAND - FIX SIDEBAR</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --navy: #152238; --gold: #d4af37; --white: #ffffff; --dark-navy: #0b1320; --gray: #f4f4f4; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; background: var(--dark-navy); }
        
        .main-container { display: flex; width: 100%; height: 100vh; }

        /* Cột sản phẩm bên trái */
        .side-listing { 
            width: 20%; min-width: 280px; height: 100%; 
            background: var(--white); border-right: 2px solid var(--gold);
            display: flex; flex-direction: column; z-index: 1005;
            transition: all 0.3s ease;
        }
        
        .listing-header { 
            background: var(--navy); color: var(--gold); padding: 15px; 
            font-weight: bold; text-align: center; font-size: 14px; 
            text-transform: uppercase; border-bottom: 2px solid var(--gold);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* Nút đóng danh sách trên Mobile */
        .btn-close-list { display: none; background: none; border: none; color: var(--gold); font-size: 20px; cursor: pointer; }

        .listing-content { flex: 1; overflow-y: auto; background: var(--gray); padding: 10px; }
        
        .product-card { 
            background: white; border-radius: 6px; padding: 12px; margin-bottom: 10px;
            border-left: 4px solid var(--gold); cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .product-card h4 { margin: 0 0 5px 0; font-size: 13px; color: var(--navy); }
        .product-card .price-tag { color: #d32f2f; font-weight: bold; font-size: 13px; }

        #map-wrapper { flex: 1; position: relative; height: 100%; }
        #map { width: 100%; height: 100%; z-index: 1; }

        .brand-header { position: absolute; top: 10px; left: 10px; z-index: 1002; background: var(--navy); padding: 8px 12px; border-radius: 6px; border: 1.5px solid var(--gold); }
        .brand-header span { color: var(--gold); font-size: 14px; font-weight: 800; text-transform: uppercase; }
        
        .btn-ui-float { position: absolute; top: 10px; right: 10px; z-index: 1002; }
        .btn-post { background: #28a745; color: white; border: 1.5px solid white; width: 40px; height: 40px; border-radius: 50%; font-weight: bold; font-size: 22px; cursor: pointer; }

        .main-controls { position: absolute; top: 60px; left: 10px; right: 10px; z-index: 1001; max-width: 450px; }
        .single-search-bar { background: var(--navy); padding: 6px; border-radius: 8px; border: 1px solid var(--gold); display: flex; gap: 5px; }
        .input-wrapper { flex: 1; background: white; border-radius: 4px; display: flex; padding: 0 8px; border: 1px solid var(--gold); }
        .input-wrapper input { border: none; flex: 1; outline: none; padding: 8px; font-size: 14px; width: 100%; }
        
        .map-layer-control { position: absolute; bottom: 80px; left: 10px; z-index: 1002; display: flex; flex-direction: column; gap: 5px; }
        .btn-layer { background: white; border: 2px solid var(--navy); color: var(--navy); padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-layer.active { background: var(--navy); color: var(--gold); border-color: var(--gold); }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .side-listing { position: fixed; left: -100%; width: 85%; height: 100%; box-shadow: 5px 0 15px rgba(0,0,0,0.3); }
            .side-listing.mobile-active { left: 0; }
            .btn-close-list { display: block; }
            .btn-toggle-list { 
                position: absolute; bottom: 150px; left: 10px; z-index: 1003; 
                background: var(--navy); color: var(--gold); border: 2px solid var(--gold); 
                width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px;
            }
        }
        @media (min-width: 769px) { .btn-toggle-list { display: none; } }

        .price-pin { display: flex; flex-direction: column; align-items: center; }
        .pin-label { background: var(--navy); color: var(--gold); padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 11px; border: 1px solid var(--gold); }
        .pin-drop { width: 22px; height: 22px; background: url('https://cdn-icons-png.flaticon.com/512/684/684908.png') no-repeat center; background-size: contain; filter: hue-rotate(140deg); }
        
        #side-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 380px; height: 100%; background: white; z-index: 2000; transition: 0.4s ease; box-shadow: -5px 0 15px rgba(0,0,0,0.2); }
        #side-panel.active { right: 0; }
    </style>
</head>
<body>

<div class="main-container">
    <!-- CỘT SẢN PHẨM MỚI ĐĂNG -->
    <div class="side-listing" id="sideListing">
        <div class="listing-header">
            <span>Sản phẩm mới đăng</span>
            <button class="btn-close-list" onclick="toggleSidebar()"><i class="fa fa-times"></i></button>
        </div>
        <div class="listing-content" id="listingItems"></div>
    </div>

    <div id="map-wrapper">
        <div class="brand-header"><span>NVALAND</span></div>
        
        <!-- Nút mở danh sách trên Mobile -->
        <button class="btn-toggle-list" id="btnToggle" onclick="toggleSidebar()">
            <i class="fa fa-list"></i>
        </button>

        <div class="btn-ui-float">
            <button class="btn-post" onclick="alert('Chức năng đang phát triển')">+</button>
        </div>

        <div class="main-controls">
            <div class="single-search-bar">
                <div class="input-wrapper">
                    <input type="text" id="inputSearch" placeholder="Tìm mã hoặc địa chỉ...">
                </div>
                <button style="background:var(--gold); border:none; padding:8px 15px; border-radius:4px; font-weight:bold; cursor:pointer;" onclick="executeSearch()">Tìm</button>
            </div>
        </div>

        <div class="map-layer-control">
            <button class="btn-layer active" id="btnSat" onclick="setLayer('sat')">Vệ tinh</button>
            <button class="btn-layer" id="btnStreet" onclick="setLayer('street')">Tên đường</button>
        </div>

        <div id="map"></div>
    </div>
</div>

<div id="side-panel">
    <div style="padding:20px;">
        <span onclick="closePanel()" style="float:right; font-size:25px; cursor:pointer;">✕</span>
        <div id="panelBody" style="margin-top:30px;"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
    const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' });
    const streetLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { subdomains: ['mt0', 'mt1', 'mt2', 'mt3'] });

    var map = L.map('map', { zoomControl: false, layers: [satLayer] }).setView([10.012, 105.090], 14);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    function setLayer(type) {
        if(type === 'sat') {
            map.addLayer(satLayer); map.removeLayer(streetLayer);
            document.getElementById('btnSat').classList.add('active'); document.getElementById('btnStreet').classList.remove('active');
        } else {
            map.addLayer(streetLayer); map.removeLayer(satLayer);
            document.getElementById('btnStreet').classList.add('active'); document.getElementById('btnSat').classList.remove('active');
        }
    }

    // Logic Đóng/Mở Sidebar
    function toggleSidebar() {
        const sidebar = document.getElementById('sideListing');
        sidebar.classList.toggle('mobile-active');
    }

    const bdsData = [];
    const types = ["Nhà riêng", "Đất nền", "Chung cư", "Kho xưởng"];
    for (let i = 1; i <= 30; i++) {
        bdsData.push({
            id: "KG" + (i < 10 ? "0" + i : i),
            ten: types[i % 4] + " đường số " + i,
            gia: (Math.random() * 5 + 1).toFixed(1) + " tỷ",
            toaDo: [10.005 + (Math.random() * 0.03), 105.080 + (Math.random() * 0.04)],
            mota: "Thông tin chi tiết bất động sản tại Kiên Giang..."
        });
    }

    var clusters = L.markerClusterGroup();
    const listContainer = document.getElementById('listingItems');

    function initData() {
        clusters.clearLayers();
        listContainer.innerHTML = '';
        bdsData.forEach(item => {
            const icon = L.divIcon({
                className: 'custom-pin',
                html: `<div class="price-pin"><div class="pin-label">${item.gia}</div><div class="pin-drop"></div></div>`,
                iconSize: [40, 40], iconAnchor: [20, 40]
            });
            const marker = L.marker(item.toaDo, { icon: icon }).on('click', () => openDetail(item));
            clusters.addLayer(marker);

            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `<h4>${item.ten}</h4><div class="price-tag">${item.gia}</div><p style="font-size:11px; color:gray; margin-top:5px;">Mã: ${item.id}</p>`;
            card.onclick = () => {
                map.setView(item.toaDo, 17);
                openDetail(item);
                if(window.innerWidth <= 768) toggleSidebar(); // Tự động đóng khi chọn sản phẩm
            };
            listContainer.appendChild(card);
        });
        map.addLayer(clusters);
    }
    initData();

    function openDetail(item) {
        document.getElementById('panelBody').innerHTML = `<h3>${item.ten}</h3><p>Mã: ${item.id}</p><p>Giá: <b style="color:red">${item.gia}</b></p><p>${item.mota}</p><br><a href="tel:0354244883" style="display:block; text-align:center; background:var(--navy); color:var(--gold); padding:12px; border-radius:5px; text-decoration:none; font-weight:bold; border:1px solid var(--gold);">GỌI LIÊN HỆ</a>`;
        document.getElementById('side-panel').classList.add('active');
    }
    function closePanel() { document.getElementById('side-panel').classList.remove('active'); }
    function executeSearch() {
        const query = document.getElementById('inputSearch').value.toUpperCase();
        const res = bdsData.find(i => i.id.includes(query));
        if(res) { map.setView(res.toaDo, 17); openDetail(res); } else { alert("Không tìm thấy!"); }
    }
</script>
</body>
</html>
