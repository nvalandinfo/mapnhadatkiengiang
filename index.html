<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NVALAND - OPTIMIZED INTERFACE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --navy: #152238; --gold: #d4af37; --white: #ffffff; --dark-navy: #0b1320; --gray: #f4f4f4; --red: #EA4335; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; background: var(--dark-navy); }
        
        .main-container { display: flex; width: 100%; height: 100vh; }

        /* SIDE LISTING */
        .side-listing {
            width: 20%; min-width: 280px; height: 100%;
            background: var(--white); border-right: 2px solid var(--gold);
            display: flex; flex-direction: column; z-index: 1005;
            transition: all 0.3s ease;
        }
        .listing-header {
            background: var(--navy); color: var(--gold); padding: 15px;
            font-weight: bold; text-align: center; font-size: 14px;
            text-transform: uppercase; border-bottom: 2px solid var(--gold);
            display: flex; justify-content: center; align-items: center; position: relative;
        }
        .btn-close-list { position: absolute; right: 10px; background: none; border: none; color: var(--gold); font-size: 20px; cursor: pointer; display: none; }
        .listing-content { flex: 1; overflow-y: auto; background: var(--gray); padding: 10px; }

        /* PRODUCT CARD */
        .product-card {
            background: white; border-radius: 6px; padding: 10px; margin-bottom: 10px;
            border-left: 4px solid var(--gold); cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: 0.2s; display: flex; gap: 10px; align-items: center; position: relative;
        }
        .product-card img { width: 60px; height: 60px; border-radius: 4px; object-fit: cover; }
        .product-info { flex: 1; }
        .product-card h4 { margin: 0 0 5px 0; font-size: 13px; color: var(--navy); padding-right: 20px; }
        .product-card p { margin: 2px 0; font-size: 11px; color: #555; }
        .product-card .price-tag { color: #d32f2f; font-weight: bold; font-size: 12px; }
        .btn-heart-item { position: absolute; top: 10px; right: 10px; color: #ccc; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-heart-item.active { color: var(--red); }

        #map-wrapper { flex: 1; position: relative; height: 100%; }
        #map { width: 100%; height: 100%; z-index: 1; }

        /* BRAND HEADER & DESKTOP ICONS */
        .brand-header { 
            position: absolute; top: 10px; left: 10px; z-index: 1002; 
            background: var(--navy); padding: 8px 12px; border-radius: 6px; 
            border: 1.5px solid var(--gold); display: flex; align-items: center; gap: 15px;
        }
        .brand-header span { color: var(--gold); font-size: 14px; font-weight: 800; text-transform: uppercase; }
        .desktop-icons { display: flex; gap: 15px; border-left: 1px solid var(--gold); padding-left: 15px; margin-left: 5px; }
        .desktop-icons i { color: var(--gold); cursor: pointer; font-size: 16px; }

        /* SEARCH BAR */
        .main-controls { position: absolute; top: 60px; left: 10px; right: 10px; z-index: 1001; max-width: 600px; }
        .search-bar-container {
            background: var(--navy); padding: 8px; border-radius: 10px;
            border: 1px solid var(--gold); display: flex; gap: 6px; align-items: center;
        }
        .input-custom { flex: 1; background: white; border-radius: 4px; display: flex; align-items: center; padding: 0 8px; border: 1px solid var(--gold); }
        .input-custom input { border: none; outline: none; padding: 8px 4px; font-size: 13px; width: 100%; }
        .btn-navy-gold { background: var(--navy); color: var(--gold); border: 1px solid var(--gold); padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }

        /* MAP PIN */
        .price-pin { display: flex; flex-direction: column; align-items: center; }
        .pin-label { background: var(--navy); color: var(--gold); padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; border: 1px solid var(--gold); }
        .pin-drop { width: 24px; height: 24px; background: url('https://cdn-icons-png.flaticon.com/512/684/684908.png') no-repeat center; background-size: contain; filter: hue-rotate(345deg) brightness(0.9) saturate(5); }

        /* NAVIGATION MOBILE (TIKTOK STYLE) */
        .mobile-nav {
            position: absolute; bottom: 0; left: 0; right: 0; 
            background: var(--navy); height: 65px; z-index: 1005;
            display: none; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--gold);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--white); cursor: pointer; position: relative; }
        .nav-item i { font-size: 20px; margin-bottom: 2px; }
        .nav-item span { font-size: 10px; }
        .nav-item.active i, .nav-item.active span { color: var(--gold); }
        
        .btn-add-mobile {
            width: 45px; height: 30px; background: var(--white);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            position: relative; border-left: 3px solid #00f2ea; border-right: 3px solid #ff0050;
        }
        .btn-add-mobile i { color: black; font-size: 18px; margin: 0; }

        /* ZOOM & LAYER POSITION */
        .map-layer-control { position: absolute; bottom: 80px; left: 10px; z-index: 1002; display: flex; flex-direction: column; gap: 8px; }
        .leaflet-control-zoom { border: none !important; border-radius: 8px !important; overflow: hidden; box-shadow: 0 1px 5px rgba(0,0,0,0.4); }
        .btn-layer { background: white; border: 2px solid var(--navy); color: var(--navy); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-layer.active { background: var(--navy); color: var(--gold); border-color: var(--gold); }

        #side-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 350px; height: 100%; background: white; z-index: 2000; transition: 0.4s ease; }
        #side-panel.active { right: 0; }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            .side-listing { position: fixed; left: -100%; width: 85%; }
            .side-listing.mobile-active { left: 0; }
            .btn-close-list { display: block; }
            .mobile-nav { display: flex; }
            .desktop-icons, .btn-post { display: none; }
            .map-layer-control { bottom: 100px; }
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="side-listing" id="sideListing">
        <div class="listing-header">
            Tin đăng mới nhất
            <button class="btn-close-list" onclick="document.getElementById('sideListing').classList.remove('mobile-active')">X</button>
        </div>
        <div class="listing-content" id="listingItems"></div>
    </div>
    
    <div id="map-wrapper">
        <!-- Brand Header with Desktop Icons -->
        <div class="brand-header">
            <span>NVALAND</span>
            <div class="desktop-icons">
                <i class="fa fa-heart" title="Yêu thích"></i>
                <i class="fa fa-comment-dots" title="Tin nhắn"></i>
                <i class="fa fa-user" title="Cá nhân"></i>
            </div>
        </div>

        <div class="main-controls">
            <div class="search-bar-container">
                <div class="input-custom">
                    <input type="text" id="inputSearch" placeholder="Tìm mã số hoặc địa chỉ...">
                    <button onclick="executeSearch()" style="background:none; border:none; color:var(--navy);"><i class="fa fa-search"></i></button>
                </div>
                <button class="btn-navy-gold" onclick="alert('Bộ lọc')"><i class="fa fa-filter"></i> Lọc</button>
                <button class="btn-navy-gold btn-post" onclick="alert('Đăng tin')"><i class="fa fa-plus"></i> Đăng tin</button>
            </div>
        </div>

        <!-- Navigation Bottom (Mobile Only) -->
        <div class="mobile-nav">
            <div class="nav-item active" onclick="document.getElementById('sideListing').classList.toggle('mobile-active')">
                <i class="fa fa-list"></i>
                <span>Tin đăng</span>
            </div>
            <div class="nav-item">
                <i class="fa fa-heart"></i>
                <span>Yêu thích</span>
            </div>
            <div class="nav-item" onclick="alert('Đăng tin')">
                <div class="btn-add-mobile"><i class="fa fa-plus"></i></div>
            </div>
            <div class="nav-item">
                <i class="fa fa-comment-dots"></i>
                <span>Tin nhắn</span>
            </div>
            <div class="nav-item">
                <i class="fa fa-user"></i>
                <span>Cá nhân</span>
            </div>
        </div>

        <div class="map-layer-control">
            <div id="zoom-container"></div> 
            <button class="btn-layer active" id="btnSat" onclick="setLayer('sat')">Vệ tinh</button>
            <button class="btn-layer" id="btnStreet" onclick="setLayer('street')">Tên đường</button>
        </div>
        <div id="map"></div>
    </div>
</div>

<div id="side-panel">
    <div style="padding:20px;">
        <span onclick="closePanel()" style="float:right; font-size:25px; cursor:pointer;">X</span>
        <div id="panelBody" style="margin-top:30px;"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
<script>
    const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' });
    const streetLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { subdomains: ['mt0', 'mt1', 'mt2', 'mt3'] });

    var map = L.map('map', { zoomControl: false, layers: [satLayer] }).setView([10.012, 105.090], 14);
    L.control.zoom({ position: 'topleft' }).addTo(map);
    document.querySelector('.map-layer-control').prepend(document.querySelector('.leaflet-control-zoom'));

    function setLayer(type) {
        if(type === 'sat') {
            map.addLayer(satLayer); map.removeLayer(streetLayer);
            document.getElementById('btnSat').classList.add('active');
            document.getElementById('btnStreet').classList.remove('active');
        } else {
            map.addLayer(streetLayer); map.removeLayer(satLayer);
            document.getElementById('btnStreet').classList.add('active');
            document.getElementById('btnSat').classList.remove('active');
        }
    }

    const bdsData = [];
    for (let i=1; i<=20; i++) {
        bdsData.push({
            id: "KG" + (i<10?"0"+i:i),
            ten: "Bất động sản khu vực " + i,
            gia: (Math.random()*5+1).toFixed(1) + " tỷ",
            toaDo: [10.005 + (Math.random() * 0.03), 105.080 + (Math.random() * 0.04)],
            anh: "https://picsum.photos/id/" + (i+20) + "/200/200"
        });
    }

    const listContainer = document.getElementById('listingItems');
    function initData() {
        listContainer.innerHTML = '';
        bdsData.forEach(item => {
            const icon = L.divIcon({
                className: 'custom-pin',
                html: `<div class="price-pin"><div class="pin-label">${item.gia}</div><div class="pin-drop"></div></div>`,
                iconSize: [40, 40], iconAnchor: [20, 40]
            });
            L.marker(item.toaDo, { icon: icon }).addTo(map).on('click', () => openDetail(item));

            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${item.anh}">
                <div class="product-info">
                    <h4>${item.ten}</h4>
                    <p>Mã: ${item.id}</p>
                    <div class="price-tag">${item.gia}</div>
                </div>
                <i class="fa fa-heart btn-heart-item" onclick="toggleFavorite(this, event)"></i>
            `;
            card.onclick = () => { map.setView(item.toaDo, 17); openDetail(item); };
            listContainer.appendChild(card);
        });
    }
    
    function toggleFavorite(el, e) {
        e.stopPropagation();
        el.classList.toggle('active');
        if(el.classList.contains('active')) el.classList.replace('fa-heart-o', 'fa-heart');
    }

    function openDetail(item) {
        document.getElementById('panelBody').innerHTML = `<h3>${item.ten}</h3><p>Giá: ${item.gia}</p><img src="${item.anh}" style="width:100%">`;
        document.getElementById('side-panel').classList.add('active');
    }
    function closePanel() { document.getElementById('side-panel').classList.remove('active'); }

    initData();
</script>
</body>
</html>
