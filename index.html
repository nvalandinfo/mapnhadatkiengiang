<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NVALAND - MOBILE OPTIMIZED</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --navy: #152238; --gold: #d4af37; --white: #ffffff; --dark-navy: #0b1320; --gray: #f4f4f4; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; background: var(--dark-navy); }
        
        /* --- THANH TRƯỢT NGANG (QUICK ACTIONS) --- */
        .scroll-container {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 5px 0;
            scrollbar-width: none; /* Ẩn scrollbar Firefox */
            -ms-overflow-style: none; /* Ẩn scrollbar IE/Edge */
        }
        .scroll-container::-webkit-scrollbar { display: none; } /* Ẩn scrollbar Chrome/Safari */

        .btn-quick {
            flex: 0 0 auto; /* Không cho co lại, giữ kích thước để trượt */
            width: 75px;    /* Khung nhỏ lại */
            height: 55px;
            background: rgba(21, 34, 56, 0.85);
            backdrop-filter: blur(5px);
            border: 1px solid var(--gold);
            border-radius: 8px;
            color: var(--gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-quick i { font-size: 16px; margin-bottom: 3px; }
        .btn-quick span { font-size: 9px; font-weight: bold; text-align: center; line-height: 1; white-space: nowrap; }

        /* --- SIDE PANEL TRƯỢT TỪ TRÁI SANG --- */
        #side-panel { 
            position: fixed; 
            top: 0; 
            left: -100%; /* Bắt đầu từ bên ngoài bên trái */
            width: 100%; 
            max-width: 400px; 
            height: 100%; 
            background: white; 
            z-index: 3000; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 5px 0 15px rgba(0,0,0,0.3); 
        }
        #side-panel.active { left: 0; } /* Trượt vào */

        /* --- LAYOUT CHUNG --- */
        .main-container { display: flex; width: 100%; height: 100vh; }
        #map-wrapper { flex: 1; position: relative; height: 100%; }
        #map { width: 100%; height: 100%; z-index: 1; }

        .top-header-container {
            position: absolute; top: 10px; left: 10px; right: 10px; z-index: 1002;
            display: flex; flex-direction: column; gap: 8px;
        }
        .header-row { display: flex; gap: 8px; align-items: center; }
        .brand-header { background: var(--navy); padding: 8px 12px; border-radius: 6px; border: 1.5px solid var(--gold); }
        .brand-header span { color: var(--gold); font-size: 14px; font-weight: 800; }

        .search-bar-container {
            flex: 1; background: var(--navy); padding: 5px 8px; border-radius: 8px;
            border: 1px solid var(--gold); display: flex; gap: 5px; align-items: center;
        }
        .input-custom { flex: 1; background: white; border-radius: 4px; display: flex; align-items: center; padding: 0 8px; }
        .input-custom input { border: none; outline: none; padding: 6px 0; font-size: 13px; width: 100%; }

        .btn-post { background: #28a745; color: white; border: none; padding: 8px 10px; border-radius: 4px; font-weight: bold; font-size: 12px; white-space: nowrap; }

        /* Marker style */
        .price-pin { display: flex; flex-direction: column; align-items: center; }
        .pin-label { background: var(--navy); color: var(--gold); padding: 2px 5px; border-radius: 4px; font-size: 10px; border: 1px solid var(--gold); font-weight: bold; }
        .pin-drop { width: 20px; height: 20px; background: url('https://cdn-icons-png.flaticon.com/512/684/684908.png') no-repeat center; background-size: contain; filter: hue-rotate(345deg) saturate(5); }
    </style>
</head>
<body>

<div class="main-container">
    <div id="map-wrapper">
        <div class="top-header-container">
            <!-- Hàng 1: Logo + Search -->
            <div class="header-row">
                <div class="brand-header"><span>NVALAND</span></div>
                <div class="search-bar-container">
                    <div class="input-custom">
                        <input type="text" placeholder="Tìm địa điểm, mã số...">
                        <i class="fa fa-search" style="color:var(--navy)"></i>
                    </div>
                    <button class="btn-post">ĐĂNG TIN</button>
                </div>
            </div>

            <!-- Hàng 2: Các nút chức năng trượt ngang -->
            <div class="scroll-container">
                <div class="btn-quick" onclick="showContent('Tin tức bất động sản')">
                    <i class="fa-solid fa-newspaper"></i>
                    <span>Tin tức</span>
                </div>
                <div class="btn-quick" onclick="showContent('Danh sách dự án')">
                    <i class="fa-solid fa-city"></i>
                    <span>Dự án</span>
                </div>
                <div class="btn-quick" onclick="showContent('Tư vấn phong thủy')">
                    <i class="fa-solid fa-compass"></i>
                    <span>Phong thủy</span>
                </div>
                <div class="btn-quick" onclick="showContent('Xem tuổi xây nhà')">
                    <i class="fa-solid fa-calendar-check"></i>
                    <span>Xem tuổi</span>
                </div>
                <div class="btn-quick" onclick="showContent('Chi phí làm nhà')">
                    <i class="fa-solid fa-calculator"></i>
                    <span>Chi phí</span>
                </div>
                <div class="btn-quick" onclick="showContent('Tính lãi suất vay')">
                    <i class="fa-solid fa-percent"></i>
                    <span>Lãi suất</span>
                </div>
            </div>
        </div>

        <div id="map"></div>
    </div>
</div>

<!-- Side Panel trượt từ trái sang -->
<div id="side-panel">
    <div style="padding:15px; display: flex; flex-direction: column; height: 100%;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px;">
            <h3 id="panelTitle" style="margin:0; color:var(--navy); font-size: 18px;">Nội dung</h3>
            <i class="fa-solid fa-xmark" onclick="closePanel()" style="font-size: 24px; cursor: pointer; color: var(--navy);"></i>
        </div>
        <div id="panelBody" style="margin-top:20px; overflow-y: auto; flex: 1;">
            <!-- Nội dung sẽ load ở đây -->
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Khởi tạo bản đồ (Vệ tinh)
    var map = L.map('map', { zoomControl: false }).setView([10.012, 105.090], 14);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    // Dữ liệu mẫu
    const sampleData = [
        {toaDo: [10.015, 105.095], gia: "3.5 tỷ"},
        {toaDo: [10.010, 105.085], gia: "2.1 tỷ"},
        {toaDo: [10.020, 105.100], gia: "5.2 tỷ"}
    ];

    sampleData.forEach(item => {
        const icon = L.divIcon({
            className: 'custom-pin',
            html: `<div class="price-pin"><div class="pin-label">${item.gia}</div><div class="pin-drop"></div></div>`,
            iconSize: [40, 40]
        });
        L.marker(item.toaDo, {icon: icon}).addTo(map);
    });

    // Hàm điều khiển Panel trượt trái
    function showContent(title) {
        document.getElementById('panelTitle').innerText = title;
        document.getElementById('panelBody').innerHTML = `
            <div style="background:#f9f9f9; padding:15px; border-radius:8px;">
                <p>Đang tải nội dung cho <b>${title}</b>...</p>
                <div style="width:100%; height:150px; background:#ddd; border-radius:5px; margin-top:10px;"></div>
                <p style="font-size:13px; color:#666; margin-top:10px;">Đây là khu vực hiển thị chi tiết nội dung khi người dùng bấm vào các nút chức năng nhanh.</p>
            </div>
        `;
        document.getElementById('side-panel').classList.add('active');
    }

    function closePanel() {
        document.getElementById('side-panel').classList.remove('active');
    }
</script>

</body>
</html>
