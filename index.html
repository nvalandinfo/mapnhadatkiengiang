<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NVALAND - HỆ THỐNG BĐS RẠCH GIÁ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    
    <style>
        :root { --navy: #152238; --gold: #d4af37; --red: #e11d48; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100vh; z-index: 1; }

        /* LOGO NVALAND */
        .brand-header {
            position: absolute; top: 15px; left: 15px; z-index: 1002;
            background: var(--navy); padding: 10px 20px; border-radius: 8px;
            border: 2px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .brand-header span { color: var(--gold); font-size: 20px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }

        /* TÌM KIẾM VÀ BỘ LỌC */
        .search-area {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1001; width: 90%; max-width: 600px;
        }
        .search-bar-wrapper {
            background: white; border-radius: 50px; display: flex; align-items: center;
            padding: 5px 8px 5px 20px; box-shadow: 0 6px 25px rgba(0,0,0,0.2); border: 1.5px solid var(--navy);
        }
        .search-bar-wrapper input { border: none; flex: 1; outline: none; font-size: 14px; color: var(--navy); }
        .btn-action { background: var(--navy); color: var(--gold); border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px; margin-left: 5px; }

        /* BẢNG BỘ LỌC ẨN */
        .filter-panel {
            display: none; background: white; margin-top: 10px; border-radius: 15px; padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); border-top: 3px solid var(--gold);
        }
        .filter-panel.active { display: block; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .filter-grid select { padding: 8px; border-radius: 5px; border: 1px solid #ddd; }

        /* GHIM GIỌT NƯỚC MÀU ĐỎ */
        .price-pin { display: flex; flex-direction: column; align-items: center; }
        .pin-label {
            background: var(--navy); color: var(--gold); padding: 3px 10px;
            border-radius: 5px; font-weight: bold; font-size: 12px;
            border: 1.5px solid var(--gold); white-space: nowrap; margin-bottom: 2px;
        }
        .pin-drop {
            width: 30px; height: 30px;
            background: url('https://cdn-icons-png.flaticon.com/512/684/684908.png') no-repeat center;
            background-size: contain; filter: brightness(0) saturate(100%) invert(20%) sepia(85%) saturate(4500%) hue-rotate(345deg) brightness(95%) contrast(90%); /* Màu đỏ */
        }

        /* SIDE PANEL */
        #side-panel {
            position: fixed; top: 0; right: -100%; width: 380px; height: 100%;
            background: white; z-index: 2000; transition: 0.4s ease; box-shadow: -10px 0 30px rgba(0,0,0,0.15);
        }
        #side-panel.active { right: 0; }
        .btn-call-fixed {
            display: block; width: 100%; background: var(--navy); color: var(--gold);
            text-align: center; padding: 18px; border-radius: 10px;
            text-decoration: none; font-weight: 800; font-size: 18px; margin-top: 25px;
            border: 1px solid var(--gold);
        }

        .leaflet-right .leaflet-control-zoom { margin-bottom: 30px !important; }
        @media (max-width: 600px) { #side-panel { width: 100%; } .brand-header { display: none; } }
    </style>
</head>
<body>

<div class="brand-header"><span>NVALAND</span></div>

<div class="search-area">
    <div class="search-bar-wrapper">
        <input type="text" id="inputSearch" placeholder="Nhập mã (RG01), tên hoặc giá...">
        <button class="btn-action" onclick="toggleFilter()">Bộ lọc ▽</button>
        <button class="btn-action" onclick="executeSearch()">Tìm</button>
    </div>
    
    <div class="filter-panel" id="filterPanel">
        <div class="filter-grid">
            <select id="fType"><option value="">Loại đất</option><option value="Đất nền">Đất nền</option></select>
            <select id="fPrice"><option value="">Mức giá</option><option value="1">Dưới 2 tỷ</option></select>
            <select id="fSize"><option value="">Diện tích</option><option value="100">Dưới 100m²</option></select>
            <select id="fDir"><option value="">Hướng</option><option value="Đông">Đông</option></select>
        </div>
    </div>
</div>

<div id="side-panel">
    <div style="padding:25px;">
        <span onclick="closePanel()" style="float:right; font-size:30px; cursor:pointer;">✕</span>
        <div id="panelBody" style="margin-top:40px;"></div>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
    const bdsData = [
        { id: "RG01", ten: "Đất Nền Phú Cường - Rạch Giá", gia: "3.5 tỷ", toaDo: [10.0085, 105.1052], mota: "Sổ hồng riêng, khu dân cư đông đúc.", sdt: "0354244883" },
        { id: "RG02", ten: "Nhà Phố Lấn Biển Tây Bắc", gia: "4.2 tỷ", toaDo: [10.0128, 105.0805], mota: "Gần biển, không khí thoáng mát.", sdt: "0354244883" }
    ];

    var map = L.map('map', { zoomControl: true }).setView([10.012, 105.080], 14);
    map.zoomControl.setPosition('bottomright');
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    var clusters = L.markerClusterGroup();
    var markerRefs = {};

    bdsData.forEach(item => {
        var icon = L.divIcon({
            className: 'custom-icon',
            html: `<div class="price-pin"><div class="pin-label">${item.gia}</div><div class="pin-drop"></div></div>`,
            iconSize: [60, 60], iconAnchor: [30, 60]
        });
        var marker = L.marker(item.toaDo, { icon: icon });
        marker.on('click', () => openDetail(item));
        clusters.addLayer(marker);
        markerRefs[item.id] = marker;
    });
    map.addLayer(clusters);

    function toggleFilter() { document.getElementById('filterPanel').classList.toggle('active'); }

    function openDetail(item) {
        document.getElementById('panelBody').innerHTML = `
            <div style="font-size:12px; color:#888; font-weight:bold;">MÃ SỐ: ${item.id}</div>
            <h2 style="color:var(--navy); margin:10px 0;">${item.ten}</h2>
            <div style="font-size:32px; color:var(--navy); font-weight:900; border-bottom:2px solid var(--gold); padding-bottom:10px;">${item.gia}</div>
            <p style="margin-top:20px; line-height:1.6; color:#444;">${item.mota}</p>
            <a href="tel:0354244883" class="btn-call-fixed">LIÊN HỆ 0354 244 883</a>
        `;
        document.getElementById('side-panel').classList.add('active');
        map.flyTo(item.toaDo, 17);
    }

    function closePanel() { document.getElementById('side-panel').classList.remove('active'); }

    function executeSearch() {
        const query = document.getElementById('inputSearch').value.trim().toUpperCase();
        const result = bdsData.find(i => i.id === query || i.ten.toUpperCase().includes(query) || i.gia.includes(query));
        if(result) openDetail(result); else alert("Không tìm thấy kết quả phù hợp!");
    }
</script>
</body>
</html>
