<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NVALAND MAP PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css"/>

<style>
:root{
--navy:#1f3b5f;
--yellow:#facc15;
--green:#22c55e;
--red:#ef4444;
}

body,html{margin:0;height:100%;font-family:Arial}
#map{height:100vh}

/* HEADER */
.header{
position:absolute;
top:0;
width:100%;
height:60px;
background:var(--navy);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
z-index:1000;
}
.logo{color:#fff;font-weight:900;font-size:20px}

.center{
display:flex;
gap:10px;
}
.btn{
padding:10px 18px;
border-radius:25px;
border:none;
cursor:pointer;
font-weight:bold;
}
.btn-search{background:var(--yellow)}
.btn-post{background:#334155;color:#fff}

/* CLUSTER */
.marker-cluster div{
width:40px;height:40px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
color:#fff;font-weight:800;
}
.marker-cluster-small div{background:#22c55e}
.marker-cluster-medium div{background:#facc15}
.marker-cluster-large div{background:#f97316}

/* PIN */
.pin{
display:flex;
flex-direction:column;
align-items:center;
}
.label{
background:#fff;
padding:2px 6px;
border-radius:4px;
font-size:11px;
font-weight:bold;
}
.dot{
width:14px;height:14px;
background:var(--red);
border-radius:50%;
border:3px solid white;
}

/* PANEL */
function openPanel(item){
document.getElementById("panelData").innerHTML=`
<img src="${item.img}">
<h3>${item.ten}</h3>

<div class="price">${item.gia}</div>

<p>📍 ${item.diachi || "Rạch Giá - Kiên Giang"}</p>

<div style="display:flex; gap:10px; margin-top:10px;">
<a href="https://zalo.me/0354244883" target="_blank"
style="flex:1;background:#0084ff;color:#fff;padding:12px;text-align:center;border-radius:6px;text-decoration:none;font-weight:bold;">
💬 Zalo
</a>

<a href="tel:0354244883"
style="flex:1;background:#16a34a;color:#fff;padding:12px;text-align:center;border-radius:6px;text-decoration:none;font-weight:bold;">
📞 Gọi
</a>
</div>

<button onclick="saveLead('${item.ten}')"
style="width:100%;margin-top:10px;padding:12px;background:#facc15;border:none;border-radius:6px;font-weight:bold;">
📩 Quan tâm
</button>
`;

document.getElementById("panel").classList.add("active");
}

// MAP
var map = L.map('map').setView([10.012,105.09],13);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
.addTo(map);

// DATA 30 ĐIỂM DEMO
const data=[];
for(let i=0;i<30;i++){
let lat=10.0+(Math.random()*0.03);
let lng=105.08+(Math.random()*0.04);
let price=(Math.random()*5+0.5).toFixed(2)+" tỷ";

data.push({
ten:"BĐS Rạch Giá "+(i+1),
gia:price,
lat:lat,
lng:lng,
img:"https://images.unsplash.com/photo-1560518883-ce09059eeffa"
});
}

// CLUSTER
var clusters=L.markerClusterGroup({
iconCreateFunction:function(cluster){
let count=cluster.getChildCount();
let size=count<10?'small':count<100?'medium':'large';

return new L.DivIcon({
html:`<div>${count}</div>`,
className:`marker-cluster marker-cluster-${size}`,
iconSize:L.point(50,50)
});
}
});

// RENDER
data.forEach(item=>{
let icon=L.divIcon({
html:`<div class="pin">
<div class="label">${item.gia}</div>
<div class="dot"></div>
</div>`,
iconSize:[60,60]
});

let marker=L.marker([item.lat,item.lng],{icon})
.on("click",()=>openPanel(item));

clusters.addLayer(marker);
});

map.addLayer(clusters);

// PANEL
function openPanel(item){
document.getElementById("panelData").innerHTML=`
<img src="${item.img}">
<h3>${item.ten}</h3>
<div class="price">${item.gia}</div>
<p>📍 Rạch Giá - Kiên Giang</p>
<a href="tel:0354244883" class="call">📞 Gọi ngay</a>
`;
document.getElementById("panel").classList.add("active");
}

function closePanel(){
document.getElementById("panel").classList.remove("active");
}

</script>

</body>
</html>
