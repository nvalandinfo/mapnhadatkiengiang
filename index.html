<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NVALAND - FIX HIỂN THỊ 30 ĐIỂM</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    
    <style>
        :root { --navy: #152238; --gold: #d4af37; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100vh; background: #0b1320; }

        /* LOGO & ĐIỀU KHIỂN */
        .brand-header { position: absolute; top: 15px; left: 15px; z-index: 1002; background: var(--navy); padding: 10px 20px; border-radius: 8px; border: 2px solid var(--gold); }
        .brand-header span { color: var(--gold); font-size: 18px; font-weight: 800; text-transform: uppercase; }

        .main-controls { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1001; width: 90%; max-width: 600px; }
        .search-row { display: flex; gap: 8px; }
        .search-box { flex: 1; background: white; border-radius: 50px; display: flex; align-items: center; padding: 0 15px; border: 2px solid var(--navy); }
        .search-box input { border: none; flex: 1; outline: none; padding: 10px; }
        .btn-ui { background: var(--navy); color: var(--gold); border: 1.5px solid var(--gold); padding: 10px 15px; border-radius: 25px; font-weight: bold; cursor: pointer; }

        /* GHIM ĐỎ */
        .price-pin { display: flex; flex-direction: column; align-items: center; }
        .pin-label { background: var(--navy); color: var(--gold); padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid var(--gold); }
        .pin-drop { width: 30px; height: 30px; background: url('https://cdn-icons-png.flaticon.com/512/684/684908.png') no-repeat center; background-size: contain; filter: hue-rotate(140deg) brightness(0.8) saturate(5); }

        /* CLUSTER THEO HÌNH MINH HỌA */
        .marker-cluster-small { background-color: rgba(110, 204, 57, 0.6); } /* Xanh < 10 */
        .marker-cluster-small div { background-color: rgba(110, 204, 57, 1); color: white; }
        .marker-cluster-medium { background-color: rgba(241, 211, 87, 0.6); } /* Vàng 10-100 */
        .marker-cluster-medium div { background-color: rgba(241, 211, 87, 1); color: black; }
        .marker-cluster { background-clip: padding-box; border-radius: 20px; }
        .marker-cluster div { width: 30px; height: 30px; margin-left: 5px; margin-top: 5px; text-align: center; border-radius: 15px; font: 12px Arial; font-weight: bold; line-height: 30px; }

        #side-panel { position: fixed; top: 0; right: -100%; width: 350px; height: 100%; background: white; z-index: 2000; transition: 0.4s; box-shadow: -5px 0 15px rgba(0,0,0,0.3); padding: 20px; }
        #side-panel.active { right: 0; }
    </style>
</head>
<body>

<div class="brand-header"><span>NVALAND</span></div>

<div class="main-controls">
    <div class="search-row">
        <div class="search-box"><input type="text" id="inputSearch" placeholder="Nhập RG01 đến RG30..."></div>
        <button class="btn-ui" onclick="executeSearch()">TÌM</button>
    </div>
</div>

<div id="side-panel">
    <span onclick="this.parentElement.classList.remove('active')" style="float:right; cursor:pointer; font-size:24px;">✕</span>
    <div id="panelBody" style="margin-top:40px;"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.js"></script>

<script>
    // 1. Khởi tạo map tại Rạch Giá
    var map = L.map('map', { zoomControl: false }).setView([10.012, 105.090], 14);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    // 2. Tạo dữ liệu 30 điểm
    const data = [];
    for (let i = 1; i <= 30; i++) {
        data.push({
            id: "RG" + (i < 10 ? "0"+i : i),
            ten: "Bất động sản mẫu " + i,
            gia: (Math.random() * 5 + 1).toFixed(1) + " tỷ",
            lat: 10.005 + (Math.random() * 0.02),
            lng: 105.080 + (Math.random() * 0.03)
        });
    }

    // 3. Cluster đổi màu theo số lượng
    var clusters = L.markerClusterGroup({
        iconCreateFunction: function(cluster) {
            var count = cluster.getChildCount();
            var color = count < 10 ? 'small' : 'medium';
            return new L.DivIcon({ 
                html: '<div><span>' + count + '</span></div>', 
                className: 'marker-cluster marker-cluster-' + color, 
                iconSize: [40, 40] 
            });
        }
    });

    // 4. Vẽ điểm lên bản đồ (Ghim đỏ)
    data.forEach(item => {
        var icon = L.divIcon({
            className: 'custom-pin',
            html: `<div class="price-pin"><div class="pin-label">${item.gia}</div><div class="pin-drop"></div></div>`,
            iconSize: [60, 60], iconAnchor: [30, 60]
        });
        var marker = L.marker([item.lat, item.lng], { icon: icon })
            .on('click', () => {
                document.getElementById('panelBody').innerHTML = `<h2>${item.ten}</h2><p>Mã số: ${item.id}</p><h3>Giá: ${item.gia}</h3>`;
                document.getElementById('side-panel').classList.add('active');
            });
        clusters.addLayer(marker);
    });

    map.addLayer(clusters); // BẮT BUỘC PHẢI CÓ LỆNH NÀY

    function executeSearch() {
        const q = document.getElementById('inputSearch').value.toUpperCase();
        const r = data.find(i => i.id === q);
        if(r) {
            map.flyTo([r.lat, r.lng], 17);
            document.getElementById('panelBody').innerHTML = `<h2>${r.ten}</h2><p>Mã: ${r.id}</p><h3>Giá: ${r.gia}</h3>`;
            document.getElementById('side-panel').classList.add('active');
        } else { alert("Hãy nhập từ RG01 đến RG30"); }
    }
</script>
</body>
</html>
