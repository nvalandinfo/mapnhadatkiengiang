<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NVALAND - FIXED MAP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root { --navy: #152238; --gold: #d4af37; --white: #ffffff; --dark-navy: #0b1320; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; background: #e5e5e5; }
        #map { width: 100%; height: 100vh; z-index: 1; }

        /* BRAND & SEARCH */
        .brand-header { position: absolute; top: 10px; left: 10px; z-index: 1002; background: var(--navy); padding: 8px 12px; border-radius: 6px; border: 1.5px solid var(--gold); }
        .brand-header span { color: var(--gold); font-size: 14px; font-weight: bold; text-transform: uppercase; }
        .btn-ui-float { position: absolute; top: 10px; right: 10px; z-index: 1002; }
        .btn-post { background: #28a745; color: white; border: 1.5px solid white; width: 38px; height: 38px; border-radius: 50%; font-size: 20px; cursor: pointer; }

        .main-controls { position: absolute; top: 60px; left: 10px; right: 10px; z-index: 1001; max-width: 500px; }
        .single-search-bar { background: var(--navy); padding: 6px; border-radius: 8px; border: 1px solid var(--gold); display: flex; gap: 5px; align-items: center; }
        .input-wrapper { flex: 1; background: white; border-radius: 4px; display: flex; align-items: center; padding: 0 8px; border: 1px solid var(--gold); }
        .input-wrapper input { border: none; flex: 1; outline: none; padding: 8px; font-size: 13px; width: 100%; }
        .btn-action { background: var(--navy); color: var(--gold); border: 1px solid var(--gold); padding: 8px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }

        /* FILTER PANEL */
        .filter-expandable { background: var(--white); border-radius: 10px; padding: 0; max-height: 0; overflow: hidden; transition: all 0.3s ease-out; }
        .filter-expandable.active { padding: 15px; max-height: 500px; border: 2px solid var(--gold); margin-top: 5px; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .filter-grid select { padding: 10px; border-radius: 4px; border: 1px solid #ccc; font-size: 12px; }

        /* MAP LAYER CONTROL */
        .map-layer-control { position: absolute; bottom: 80px; left: 10px; z-index: 1002; display: flex; flex-direction: column; gap: 8px; }
        .btn-layer { background: white; border: 2px solid var(--navy); color: var(--navy); padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .btn-layer.active { background: var(--navy); color: var(--gold); border-color: var(--gold); }

        /* PIN */
        .price-pin { display: flex; flex-direction: column; align-items: center; }
        .pin-label { background: var(--navy); color: var(--gold); padding: 1px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; border: 1px solid var(--gold); }
        .pin-drop { width: 24px; height: 24px; background: url('https://cdn-icons-png.flaticon.com/512/684/684908.png') no-repeat center; background-size: contain; filter: hue-rotate(140deg); }
    </style>
</head>
<body>

<div class="brand-header"><span>NVALAND</span></div>
<div class="btn-ui-float"><button class="btn-post" onclick="alert('Đang phát triển')">+</button></div>

<div class="main-controls">
    <div class="single-search-bar">
        <div class="input-wrapper">
            <input type="text" id="inputSearch" placeholder="Tìm mã số hoặc địa chỉ...">
            <button onclick="executeSearch()" style="background:none; border:none;">🔍</button>
        </div>
        <button class="btn-action" onclick="toggleFilterPanel()"><i class="fa fa-filter"></i> Lọc</button>
    </div>
    <div class="filter-expandable" id="filterPanel">
        <div class="filter-grid">
            <select><option value="">-- Loại nhà đất --</option><option>Nhà riêng</option><option>Đất nền</option></select>
            <select><option value="">-- Mức giá --</option><option>Dưới 500 triệu</option><option>1 - 2 tỷ</option></select>
            <select><option value="">-- Diện tích --</option><option>Dưới 50m²</option></select>
            <select><option value="">-- Hướng --</option><option>Đông</option><option>Tây</option></select>
        </div>
        <button style="width:100%; margin-top:10px; padding:10px; background:var(--navy); color:var(--gold); border:1px solid var(--gold); border-radius:5px;" onclick="toggleFilterPanel()">ÁP DỤNG</button>
    </div>
</div>

<div class="map-layer-control">
    <button class="btn-layer active" id="btnSatellite" onclick="switchLayer('satellite')"><i class="fa fa-globe"></i> Vệ tinh</button>
    <button class="btn-layer" id="btnStreet" onclick="switchLayer('street')"><i class="fa fa-road"></i> Tên đường</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
    // SỬA LẠI LINK BẢN ĐỒ Ở ĐÂY ĐỂ HIỆN ẢNH
    var satelliteLayer = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
        attribution: 'Google Maps'
    });
    
    var streetLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{y}/{x}{r}.png', {
        attribution: 'CartoDB'
    });

    var map = L.map('map', { 
        zoomControl: false,
        layers: [satelliteLayer]
    }).setView([10.012, 105.090], 14);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    function switchLayer(type) {
        if (type === 'satellite') {
            map.removeLayer(streetLayer);
            map.addLayer(satelliteLayer);
            document.getElementById('btnSatellite').classList.add('active');
            document.getElementById('btnStreet').classList.remove('active');
        } else {
            map.removeLayer(satelliteLayer);
            map.addLayer(streetLayer);
            document.getElementById('btnStreet').classList.add('active');
            document.getElementById('btnSatellite').classList.remove('active');
        }
    }

    // Marker mẫu
    var clusters = L.markerClusterGroup();
    for (let i = 0; i < 20; i++) {
        let lat = 10.005 + (Math.random() * 0.02);
        let lng = 105.080 + (Math.random() * 0.03);
        const icon = L.divIcon({
            className: 'custom-pin',
            html: `<div class="price-pin"><div class="pin-label">${(Math.random()*5+1).toFixed(1)} tỷ</div><div class="pin-drop"></div></div>`,
            iconSize: [50, 50], iconAnchor: [25, 50]
        });
        clusters.addLayer(L.marker([lat, lng], { icon: icon }));
    }
    map.addLayer(clusters);

    function toggleFilterPanel() { document.getElementById('filterPanel').classList.toggle('active'); }
</script>
</body>
</html>
