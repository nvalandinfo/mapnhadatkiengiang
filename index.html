<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVALAND KIÊN GIANG</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body{margin:0;font-family:Arial;background:#f1f5f9;display:grid;grid-template-columns:350px 1fr;height:100vh}
        .sidebar{background:#fff;padding:15px;overflow-y:auto;border-right:1px solid #ddd;z-index:1001}
        #map{width:100%;height:100vh}
        .card{background:#fff;border:1px solid #eee;border-radius:10px;margin-bottom:15px;cursor:pointer;overflow:hidden;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
        .card img{width:100%;height:150px;object-fit:cover}
        .card-body{padding:10px}
        .price{color:#f97316;font-weight:bold}
        header{grid-column: span 2; background:#fff; padding:10px 20px; border-bottom:1px solid #ddd; display:flex; justify-content:space-between; align-items:center}
        @media(max-width:900px){body{grid-template-columns:1fr} .sidebar{display:none}}
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Dự án nổi bật</h2>
        <div id="list"></div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. CÀI ĐẶT DỮ LIỆU LÔ ĐẤT Ở ĐÂY (Bạn có thể thêm bớt ở đây)
        const duAn = [
            {
                id: 1,
                ten: "Villa Tân cổ điển - Lô A1",
                gia: "4.5 tỷ",
                anh: "https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=400",
                toaDo: [10.012, 105.080],
                mota: "View sân vườn, chỗ đậu xe rộng rãi."
            },
            {
                id: 2,
                ten: "Đất nền Khu phố 2",
                gia: "2.1 tỷ",
                anh: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=400",
                toaDo: [10.005, 105.075],
                mota: "Sổ hồng riêng, thổ cư 100%."
            }
        ];

        // 2. KHỞI TẠO BẢN ĐỒ
        var map = L.map('map').setView([10.012, 105.080], 14);

        // Chế độ xem vệ tinh
        var veTinh = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        var duongXa = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');

        L.control.layers({"Vệ tinh": veTinh, "Đường xá": duongXa}).addTo(map);

        // 3. TỰ ĐỘNG TẠO GHIM VÀ DANH SÁCH
        const listDiv = document.getElementById('list');

        duAn.forEach(item => {
            // Tạo ghim trên bản đồ
            var marker = L.marker(item.toaDo).addTo(map);
            
            // Nội dung khi bấm vào ghim
            var popupMain = `
                <div style="width:180px">
                    <img src="${item.anh}" style="width:100%; border-radius:5px">
                    <b>${item.ten}</b><br>
                    <span style="color:orange">${item.gia}</span><br>
                    <small>${item.mota}</small>
                </div>
            `;
            marker.bindPopup(popupMain);

            // Tạo thẻ bên danh sách trái
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${item.anh}">
                <div class="card-body">
                    <b>${item.ten}</b><br>
                    <span class="price">${item.gia}</span>
                </div>
            `;
            card.onclick = () => {
                map.flyTo(item.toaDo, 17);
                marker.openPopup();
            };
            listDiv.appendChild(card);
        });
    </script>
</body>
</html>
