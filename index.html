<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NVALAND - HỆ THỐNG BĐS CHUYÊN NGHIỆP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <style>
        :root { --navy: #152238; --gold: #d4af37; --orange: #f97316; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100vh; z-index: 1; }

        /* LOGO CHỮ VÀNG 3D NỀN NAVI */
        .brand-header {
            position: absolute; top: 15px; left: 15px; z-index: 1002;
            background: var(--navy); padding: 10px 20px; border-radius: 8px;
            border: 1px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .brand-header h1 {
            margin: 0; font-size: 22px; color: var(--gold);
            text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 1px 1px 0px #b2912a, 2px 2px 0px #8c7221, 3px 3px 5px rgba(0,0,0,0.5); /* Hiệu ứng 3D */
        }

        /* BỘ LỌC TÌM KIẾM GIỮA GIAO DIỆN - 2 HÀNG */
        .search-main-container {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1001; width: 90%; max-width: 800px;
        }
        .filter-panel {
            background: white; border-radius: 12px; padding: 15px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2); border-top: 4px solid var(--gold);
        }
        .filter-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 10px; }
        .filter-row:last-child { margin-bottom: 0; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)) 150px; }
        
        .filter-item label { display: block; font-size: 11px; font-weight: bold; color: var(--navy); margin-bottom: 4px; }
        .filter-item select, .filter-item input {
            width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none;
        }
        .btn-search-apply {
            background: #007bff; color: white; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer; height: 36px; align-self: end;
        }

        /* BẢNG THÔNG TIN TRƯỢT (SIDE PANEL) */
        #side-panel {
            position: fixed; top: 0; right: -100%; width: 360px; height: 100%;
            background: white; z-index: 2000; transition: 0.4s ease;
            box-shadow: -5px 0 25px rgba(0,0,0,0.2);
        }
        #side-panel.active { right: 0; }
        .panel-close { position: absolute; top: 15px; left: -40px; background: white; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px 0 0 8px; cursor: pointer; }

        /* NÚT ZOOM GÓC DƯỚI PHẢI */
        .leaflet-right .leaflet-control-zoom { margin-bottom: 30px !important; margin-right: 15px !important; }

        @media (max-width: 768px) {
            .brand-header { display: none; } /* Ẩn logo text trên mobile để nhường chỗ bộ lọc */
            .search-main-container { width: 95%; top: 10px; }
            .filter-row { grid-template-columns: 1fr 1fr; }
            #side-panel { width: 100%; }
        }
    </style>
</head>
<body>

<div class="brand-header">
    <h1>NVALAND</h1>
</div>

<div class="search-main-container">
    <div class="filter-panel">
        <div class="filter-row">
            <div class="filter-item">
                <label>🏷️ MÃ SỐ BÀI VIẾT</label>
                <input type="text" id="filterId" placeholder="VD: KG00...">
            </div>
            <div class="filter-item">
                <label>📍 ĐỊA PHƯƠNG/ĐỊA CHỈ</label>
                <select id="filterLoc">
                    <option value="">-- Tất cả khu vực --</option>
                    <option value="Rạch Giá">Rạch Giá</option>
                    <option value="Phú Quốc">Phú Quốc</option>
                    <option value="Hà Tiên">Hà Tiên</option>
                </select>
            </div>
            <div class="filter-item">
                <label>🏠 LOẠI NHÀ ĐẤT</label>
                <select id="filterType">
                    <option value="">-- Tất cả loại --</option>
                    <option value="Đất nền">Đất nền</option>
                    <option value="Nhà phố">Nhà phố</option>
                    <option value="Biệt thự">Biệt thự</option>
                </select>
            </div>
        </div>
        <div class="filter-row">
            <div class="filter-item">
                <label>💰 MỨC GIÁ</label>
                <select id="filterPrice">
                    <option value="">-- Tất cả giá --</option>
                    <option value="1">Dưới 2 tỷ</option>
                    <option value="2">2 - 5 tỷ</option>
                    <option value="3">Trên 5 tỷ</option>
                </select>
            </div>
            <div class="filter-item">
                <label>📐 DIỆN TÍCH</label>
                <select id="filterSize">
                    <option value="">-- Tất cả diện tích --</option>
                    <option value="1">Dưới 100m²</option>
                    <option value="2">100m² - 500m²</option>
                </select>
            </div>
            <div class="filter-item">
                <label>🧭 HƯỚNG</label>
                <select id="filterDir">
                    <option value="">-- Tất cả hướng --</option>
                    <option value="Đông">Đông</option>
                    <option value="Tây">Tây</option>
                    <option value="Nam">Nam</option>
                    <option value="Bắc">Bắc</option>
                </select>
            </div>
            <button class="btn-search-apply" onclick="applyFilters()">ÁP DỤNG LỌC</button>
        </div>
    </div>
</div>

<div id="side-panel">
    <div class="panel-close" onclick="closePanel()">✕</div>
    <div id="panelBody"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.js"></script>

<script>
    // Dữ liệu mẫu tại Rạch Giá
    const bdsData = [
        { id: "KG01", ten: "Đất nền Phú Cường", gia: "3.2 tỷ", toaDo: [10.008, 105.105], type: "Đất nền", loc: "Rạch Giá", priceVal: 2 },
        { id: "KG02", ten: "Biệt thự view biển", gia: "8.5 tỷ", toaDo: [10.012, 105.080], type: "Biệt thự", loc: "Rạch Giá", priceVal: 3 }
    ];

    var map = L.map('map', { zoomControl: true }).setView([10.012, 105.080], 14);
    map.zoomControl.setPosition('bottomright');
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    var clusters = L.markerClusterGroup();
    var markerMap = {};

    bdsData.forEach(item => {
        var icon = L.divIcon({
            className: 'price-pin',
            html: `<div style="background:var(--orange); color:white; padding:2px 8px; border-radius:4px; border:2px solid white; font-weight:bold; font-size:12px; white-space:nowrap;">${item.gia}</div>`,
            iconSize: [40, 20], iconAnchor: [20, 20]
        });
        var marker = L.marker(item.toaDo, { icon: icon });
        marker.on('click', () => openSidePanel(item));
        clusters.addLayer(marker);
        markerMap[item.id] = marker;
    });
    map.addLayer(clusters);

    function openSidePanel(item) {
        document.getElementById('panelBody').innerHTML = `
            <div style="padding:20px;">
                <h2 style="color:var(--navy)">${item.ten}</h2>
                <p>Mã số: ${item.id}</p>
                <p style="font-size:24px; color:var(--orange); font-weight:bold">${item.gia}</p>
                <hr>
                <button style="width:100%; background:var(--orange); color:white; padding:15px; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">GỌI TƯ VẤN</button>
            </div>
        `;
        document.getElementById('side-panel').classList.add('active');
        map.flyTo(item.toaDo, 17);
    }

    function closePanel() { document.getElementById('side-panel').classList.remove('active'); }

    function applyFilters() {
        const idInput = document.getElementById('filterId').value.toUpperCase();
        if(markerMap[idInput]) {
            const item = bdsData.find(i => i.id === idInput);
            openSidePanel(item);
        } else {
            alert("Không tìm thấy kết quả phù hợp!");
        }
    }
</script>
</body>
</html>
